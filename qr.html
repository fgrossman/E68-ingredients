<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Print QR Codes — E68</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .qr-grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
      @media (min-width: 560px) { .qr-grid { grid-template-columns: 1fr 1fr; } }
      .qr-card {
        background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
        padding: 20px; text-align: center;
      }
      .qr-card h3 { margin: 0 0 12px; color: var(--brand-dark); }
      .qr-card .qr { width: 240px; height: 240px; max-width: 100%; margin: 0 auto; }
      .qr-card .qr svg, .qr-card .qr img { width: 100%; height: 100%; }
      .qr-card .url { font-size: 0.8rem; color: var(--muted); word-break: break-all; margin-top: 10px; }
      .qr-card .caption { margin-top: 8px; font-weight: 600; }
      @media print {
        .topbar, .instructions, #printBtn { display: none !important; }
        .qr-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>QR Codes</h1>
      <a class="link-btn" href="menu.html">Menu</a>
    </div>
    <div class="wrap" id="wrap" style="visibility:hidden">
      <p class="instructions">
        Print these and distribute to families. People scan the one in
        their language to see ingredients. (These point at this exact website.)
      </p>
      <button class="btn accent" id="printBtn" style="margin-bottom:16px">🖨️ Print these QR codes</button>
      <div class="qr-grid">
        <div class="qr-card">
          <h3>English</h3>
          <div class="qr" id="qrEn"></div>
          <div class="caption">Scan to find ingredients</div>
          <div class="url" id="urlEn"></div>
        </div>
        <div class="qr-card">
          <h3>Español</h3>
          <div class="qr" id="qrEs"></div>
          <div class="caption">Escanee para ver ingredientes</div>
          <div class="url" id="urlEs"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);

      function drawQR(elId, url) {
        const qr = qrcode(0, "M"); // 0 = auto size, M = medium error correction
        qr.addData(url);
        qr.make();
        // Crisp, print-friendly SVG that scales to the container.
        $(elId).innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
      }

      function buildCodes() {
        const base = new URL("index.html", window.location.href).href;
        const enUrl = base + "?lang=en";
        const esUrl = base + "?lang=es";
        $("urlEn").textContent = enUrl;
        $("urlEs").textContent = esUrl;
        drawQR("qrEn", enUrl);
        drawQR("qrEs", esUrl);
      }

      $("printBtn").onclick = () => window.print();

      (async () => {
        const p = await requireRole(["admin", "photographer"]);
        if (!p) return;
        $("wrap").style.visibility = "visible";
        buildCodes();
      })();
    </script>
  </body>
</html>
