<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <title>Food Ingredients — E68</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .topbar .right { display: flex; align-items: center; gap: 6px; }
      /* Print: show only selected ingredients, one per page, fit to one page */
      #printArea { display: none; }
      @media print {
        body * { visibility: hidden; }
        #printArea, #printArea * { visibility: visible; }
        #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        @page { margin: 8mm; }
        #printArea figure {
          page-break-after: always;
          break-after: page;
          text-align: center;
          margin: 0;
        }
        #printArea figure:last-child { page-break-after: auto; break-after: auto; }
        #printArea figcaption { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
        #printArea img {
          display: block;
          margin: 0 auto;
          max-width: 100%;
          max-height: 88vh;      /* keep each image within a single page */
          object-fit: contain;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1 id="title">Food Ingredients</h1>
      <div class="right">
        <button class="link-btn" id="langBtn">Español</button>
        <a class="link-btn" id="authLink" href="signin.html">Sign in</a>
      </div>
    </div>

    <div class="wrap">
      <p class="instructions" id="instructions"></p>

      <div class="btn-row" style="justify-content:flex-start;margin-bottom:14px">
        <button class="btn secondary" id="selectBtn"></button>
      </div>

      <div id="content">
        <div class="center"><div class="spinner"></div><span id="loadingTxt">Loading…</span></div>
      </div>
    </div>

    <!-- Selection action bar -->
    <div class="actionbar">
      <button class="btn secondary" id="cancelBtn"></button>
      <span id="countTxt"></span>
      <button class="btn accent" id="printBtn"></button>
    </div>

    <!-- Lightbox -->
    <div class="modal" id="modal">
      <div class="modal-head">
        <span class="hint" id="zoomHint"></span>
        <button class="link-btn" id="closeBtn"></button>
      </div>
      <div class="modal-body" id="modalBody">
        <img id="modalImg" alt="Ingredients" />
      </div>
    </div>

    <!-- Print container -->
    <div id="printArea"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4/dist/panzoom.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      let LANG = getLang();
      let items = []; // {id, name, packetUrl, ingredientsUrl}
      let selecting = false;
      const selected = new Set();
      let panzoom = null;

      function applyLang() {
        document.documentElement.lang = LANG;
        $("title").textContent = t("viewTitle", LANG);
        $("instructions").textContent =
          t("viewInstructions", LANG) + " " + t("selectInstructions", LANG);
        $("selectBtn").textContent = t("select", LANG);
        $("cancelBtn").textContent = t("cancel", LANG);
        $("printBtn").textContent = t("printSelected", LANG);
        $("closeBtn").textContent = t("close", LANG);
        $("zoomHint").textContent = t("tapToZoom", LANG);
        $("langBtn").textContent = t("switchLang", LANG);
        updateCount();
      }

      function updateCount() {
        $("countTxt").textContent = t("selectedCount", LANG).replace(
          "{n}",
          selected.size
        );
      }

      $("langBtn").onclick = () => {
        LANG = LANG === "en" ? "es" : "en";
        const url = new URL(window.location);
        url.searchParams.set("lang", LANG);
        history.replaceState(null, "", url);
        applyLang();
      };

      $("selectBtn").onclick = () => {
        selecting = true;
        document.body.classList.add("selecting");
      };
      $("cancelBtn").onclick = () => {
        selecting = false;
        selected.clear();
        document.body.classList.remove("selecting");
        document
          .querySelectorAll(".card.selected")
          .forEach((c) => c.classList.remove("selected"));
        updateCount();
      };

      function openModal(url) {
        $("modalImg").src = url;
        $("modal").classList.add("open");
        $("modalImg").onload = () => {
          if (panzoom) panzoom.destroy();
          panzoom = Panzoom($("modalImg"), {
            maxScale: 6,
            minScale: 1,
            contain: "outside",
          });
          $("modalBody").addEventListener("wheel", panzoom.zoomWithWheel);
        };
      }
      function closeModal() {
        $("modal").classList.remove("open");
        if (panzoom) {
          panzoom.destroy();
          panzoom = null;
        }
        $("modalImg").src = "";
      }
      $("closeBtn").onclick = closeModal;
      // Double-tap to reset zoom
      let lastTap = 0;
      $("modalBody").addEventListener("click", () => {
        const now = Date.now();
        if (now - lastTap < 300 && panzoom) panzoom.reset();
        lastTap = now;
      });

      function cardClick(item, cardEl) {
        if (selecting) {
          if (selected.has(item.id)) {
            selected.delete(item.id);
            cardEl.classList.remove("selected");
          } else {
            selected.add(item.id);
            cardEl.classList.add("selected");
          }
          updateCount();
        } else {
          openModal(item.ingredientsUrl);
        }
      }

      $("printBtn").onclick = () => {
        if (selected.size === 0) {
          alert(t("nothingSelected", LANG));
          return;
        }
        const area = $("printArea");
        area.innerHTML = "";
        items
          .filter((it) => selected.has(it.id))
          .forEach((it) => {
            const fig = document.createElement("figure");
            if (it.name) {
              const cap = document.createElement("figcaption");
              cap.textContent = it.name;
              fig.appendChild(cap);
            }
            const img = document.createElement("img");
            img.src = it.ingredientsUrl;
            fig.appendChild(img);
            area.appendChild(fig);
          });
        setTimeout(() => window.print(), 600);
      };

      function render() {
        const content = $("content");
        if (items.length === 0) {
          content.innerHTML =
            '<div class="center">' + t("noItems", LANG) + "</div>";
          return;
        }
        const grid = document.createElement("div");
        grid.className = "grid";
        items.forEach((it) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML =
            '<img class="thumb" loading="lazy" src="' +
            it.packetUrl +
            '" alt="' +
            (it.name || "packet") +
            '" />' +
            '<div class="check">✓</div>' +
            (it.name ? '<div class="label">' + escapeHtml(it.name) + "</div>" : "");
          card.onclick = () => cardClick(it, card);
          grid.appendChild(card);
        });
        content.innerHTML = "";
        content.appendChild(grid);
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );
      }

      // Update the top-right link: "Menu" if already signed in, else "Sign in".
      async function updateAuthLink() {
        try {
          const { data } = await getClient().auth.getSession();
          if (data && data.session) {
            $("authLink").textContent = "Menu";
            $("authLink").href = "menu.html";
          }
        } catch (e) {
          /* not configured yet — leave as Sign in */
        }
      }

      async function load() {
        applyLang();
        updateAuthLink();
        try {
          const sb = getClient();
          const { data, error } = await sb
            .from("products")
            .select("id,name,packet_path,ingredients_path,created_at")
            .order("created_at", { ascending: false });
          if (error) throw error;
          items = (data || []).map((r) => ({
            id: r.id,
            name: r.name,
            packetUrl: publicUrl(r.packet_path),
            ingredientsUrl: publicUrl(r.ingredients_path),
          }));
          render();
        } catch (err) {
          console.error(err);
          $("content").innerHTML =
            '<div class="center error">Error loading items. Please try again later.</div>';
        }
      }

      load();
    </script>
  </body>
</html>
